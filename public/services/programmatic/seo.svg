<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620" role="img" aria-label="SEO growth chart">
  <defs>
    <linearGradient id="seoBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a140b"/>
      <stop offset="1" stop-color="#04240f"/>
    </linearGradient>
    <linearGradient id="seoArea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a6f23c" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#a6f23c" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="seoLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3f9d3a"/>
      <stop offset="1" stop-color="#a6f23c"/>
    </linearGradient>
    <filter id="seoGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="620" rx="28" fill="url(#seoBg)"/>
  <g stroke="#ffffff" stroke-opacity="0.05">
    <line x1="80" y1="120" x2="80" y2="500"/>
    <line x1="80" y1="500" x2="720" y2="500"/>
    <line x1="80" y1="420" x2="720" y2="420"/>
    <line x1="80" y1="340" x2="720" y2="340"/>
    <line x1="80" y1="260" x2="720" y2="260"/>
    <line x1="80" y1="180" x2="720" y2="180"/>
  </g>
  <path d="M80 500 L80 430 L200 400 L320 320 L440 340 L560 220 L680 150 L720 130 L720 500 Z" fill="url(#seoArea)"/>
  <path d="M80 430 L200 400 L320 320 L440 340 L560 220 L680 150 L720 130" fill="none" stroke="url(#seoLine)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#seoGlow)"/>
  <g fill="#a6f23c">
    <circle cx="320" cy="320" r="6"/>
    <circle cx="560" cy="220" r="6"/>
    <circle cx="720" cy="130" r="7"/>
  </g>
  <g font-family="Sora, sans-serif" fill="#ffffff">
    <text x="80" y="90" font-size="26" font-weight="700">Organic Visibility</text>
    <text x="82" y="565" font-size="14" fill-opacity="0.5">SERP rank &#8226; impressions &#8226; CTR</text>
  </g>
  <g transform="translate(600,60)">
    <rect width="120" height="44" rx="22" fill="#a6f23c" fill-opacity="0.12" stroke="#a6f23c" stroke-opacity="0.4"/>
    <text x="60" y="29" font-family="Sora, sans-serif" font-size="18" font-weight="700" fill="#a6f23c" text-anchor="middle">+248%</text>
  </g>
</svg>
