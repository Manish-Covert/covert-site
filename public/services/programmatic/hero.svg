<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Programmatic data network">
  <defs>
    <radialGradient id="hBg" cx="0.68" cy="0.42" r="0.9">
      <stop offset="0" stop-color="#0d2a14"/>
      <stop offset="0.5" stop-color="#061a0d"/>
      <stop offset="1" stop-color="#020806"/>
    </radialGradient>
    <linearGradient id="hLine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3f9d3a"/>
      <stop offset="1" stop-color="#a6f23c"/>
    </linearGradient>
    <radialGradient id="hNode" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#c9ff6b"/>
      <stop offset="1" stop-color="#3f9d3a"/>
    </radialGradient>
    <radialGradient id="hHalo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a6f23c" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#a6f23c" stop-opacity="0"/>
    </radialGradient>
    <filter id="hGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#hBg)"/>

  <!-- faint grid -->
  <g stroke="#a6f23c" stroke-opacity="0.05" stroke-width="1">
    <path d="M0 200 H1600 M0 400 H1600 M0 600 H1600 M0 800 H1600"/>
    <path d="M200 0 V1000 M400 0 V1000 M600 0 V1000 M800 0 V1000 M1000 0 V1000 M1200 0 V1000 M1400 0 V1000"/>
  </g>

  <!-- concentric radar arcs around focal point -->
  <g fill="none" stroke="#a6f23c" stroke-opacity="0.12">
    <circle cx="1080" cy="440" r="150"/>
    <circle cx="1080" cy="440" r="260"/>
    <circle cx="1080" cy="440" r="380"/>
    <circle cx="1080" cy="440" r="510"/>
  </g>

  <!-- network links -->
  <g stroke="url(#hLine)" stroke-opacity="0.5" stroke-width="2" fill="none">
    <path d="M1080 440 L760 250"/>
    <path d="M1080 440 L1360 260"/>
    <path d="M1080 440 L820 640"/>
    <path d="M1080 440 L1380 630"/>
    <path d="M1080 440 L980 760"/>
    <path d="M1080 440 L1220 180"/>
    <path d="M760 250 L820 640"/>
    <path d="M1360 260 L1380 630"/>
    <path d="M760 250 L1220 180"/>
  </g>

  <!-- data flow dashes -->
  <g stroke="#c9ff6b" stroke-opacity="0.35" stroke-width="2" stroke-dasharray="2 12" fill="none">
    <path d="M1080 440 L760 250"/>
    <path d="M1080 440 L1380 630"/>
    <path d="M1080 440 L1220 180"/>
  </g>

  <!-- nodes -->
  <g fill="url(#hNode)">
    <circle cx="760" cy="250" r="12"/>
    <circle cx="1360" cy="260" r="10"/>
    <circle cx="820" cy="640" r="11"/>
    <circle cx="1380" cy="630" r="14"/>
    <circle cx="980" cy="760" r="9"/>
    <circle cx="1220" cy="180" r="10"/>
  </g>

  <!-- focal hub -->
  <circle cx="1080" cy="440" r="120" fill="url(#hHalo)" opacity="0.5"/>
  <circle cx="1080" cy="440" r="46" fill="#061a0d" stroke="#a6f23c" stroke-width="3" filter="url(#hGlow)"/>
  <g stroke="#a6f23c" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M1062 440 h36 M1080 422 v36"/>
  </g>

  <!-- rising bar cluster (programmatic bidding) -->
  <g transform="translate(150,560)">
    <g fill="url(#hLine)" opacity="0.85">
      <rect x="0"   y="180" width="34" height="140" rx="6"/>
      <rect x="52"  y="120" width="34" height="200" rx="6"/>
      <rect x="104" y="60"  width="34" height="260" rx="6"/>
      <rect x="156" y="150" width="34" height="170" rx="6"/>
      <rect x="208" y="20"  width="34" height="300" rx="6"/>
    </g>
    <path d="M17 170 L69 110 L121 50 L173 140 L225 10" fill="none" stroke="#c9ff6b" stroke-width="3" stroke-linejoin="round" filter="url(#hGlow)"/>
  </g>

  <!-- soft vignette left for text legibility -->
  <rect width="1600" height="1000" fill="url(#hVig)"/>
  <linearGradient id="hVig" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#000000" stop-opacity="0.65"/>
    <stop offset="0.5" stop-color="#000000" stop-opacity="0.1"/>
    <stop offset="1" stop-color="#000000" stop-opacity="0"/>
  </linearGradient>
</svg>
