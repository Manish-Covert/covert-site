<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Covert Communication — We Do It All</title>
    <meta name="description" content="Covert Communication LLC — brand building, programmatic, SEM/SEO/GEO/AEO, social media, fraud protection, and technology consulting. We do it all." />
    <meta name="theme-color" content="#000000" />
    <meta property="og:title" content="Covert Communication — We Do It All" />
    <meta property="og:description" content="Brand building, programmatic, SEO, social media, fraud protection & technology consulting." />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

    <!-- Preload the homepage LCP image so the browser fetches it during HTML
         parse instead of waiting for React to render. -->
    <link rel="preload" as="image" href="/hero-logo.webp"
          imagesrcset="/hero-logo-760.webp 760w, /hero-logo.webp 1240w"
          imagesizes="(max-width: 900px) 88vw, 620px" fetchpriority="high" />

    <!-- Fonts: preconnect + non-render-blocking stylesheet. display=swap keeps
         text visible in a fallback face until the web font arrives. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
